<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Communicator</title>

<!-- Firebase Web SDK (compat) — App + Firestore. Projekt jupidu-36804. -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
  /* ═══ Design-System „Schiefer" (Dark, Default) — matt & erdig, mit Tiefe ═══ */
  :root{
    --surface-base:#171c20;        /* Seite */
    --surface-raised:#212830;      /* Karten/Sidebar/Panels */
    --surface-overlay:#2d3640;     /* Modal/Dropdown/Toast */
    --border:#3b4550;
    --border2:#4f5a66;
    --hover:rgba(224,226,232,.08);
    --text-primary:#eef0f2;
    --text-muted:#929aa4;
    --accent:#45c198;              /* Teal */
    --accent-deep:#2ea27b;
    --accent-soft:color-mix(in oklab, var(--accent) 24%, transparent);
    --on-accent:#04140d;
    --danger:#e5765a;              /* Koralle */
    --warning:#e3b048;             /* Sand */
    --success:#45c198;
    --info:#6aa3de;
    --pink:#d885a6;
    /* Aliase */
    --bg:var(--surface-base); --panel:var(--surface-raised); --panel2:var(--surface-overlay);
    --muted:var(--text-muted); --text:var(--text-primary); --text2:#cccfd5;
    --ok:var(--success); --warn:var(--warning); --teal:var(--info); --coral:var(--danger); --sand:var(--warning);
    --shadow:0 1px 2px rgba(0,0,0,.35), 0 6px 18px rgba(0,0,0,.26);
    --shadow-lg:0 8px 22px rgba(0,0,0,.36), 0 22px 56px rgba(0,0,0,.32);
    --radius:14px; --radius-sm:10px; --radius-lg:20px;
    --sans:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    --transition:all .16s cubic-bezier(.25,.1,.25,1);
  }
  /* ═══ „Leinen" (Light) — warmes Greige, umschaltbar ═══ */
  html.theme-light{
    --surface-base:#cdc6b6; --surface-raised:#e9e3d5; --surface-overlay:#f2ede1;
    --border:#bcb4a0; --border2:#a89d82; --hover:rgba(48,42,34,.08);
    --text-primary:#2a2620; --text-muted:#7a7463;
    --accent:#1f8a66; --accent-deep:#15704f; --accent-soft:color-mix(in oklab, var(--accent) 22%, transparent);
    --on-accent:#f4f8f4; --danger:#b34d2c; --warning:#977211; --success:#1f8a66; --info:#2c6499;
    --text2:#4d493f; --pink:#974e69;
    --shadow:0 1px 2px rgba(52,46,38,.14), 0 6px 18px rgba(52,46,38,.10);
    --shadow-lg:0 8px 22px rgba(52,46,38,.16), 0 22px 56px rgba(52,46,38,.13);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);color:var(--text);background:var(--bg);
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow:hidden}
  button{font:inherit;cursor:pointer;color:inherit}
  ::selection{background:var(--accent-soft);color:var(--text)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted)}
  h1,h2,h3{letter-spacing:-.012em}

  /* ───── Layout ───── */
  .app{display:flex;flex-direction:column;height:100vh}
  header.topbar{display:flex;align-items:center;gap:14px;padding:11px 18px;background:var(--panel);
    border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:11px;font-weight:800;font-size:16px}
  .brand .logo{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;font-size:17px;
    background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:var(--on-accent);
    box-shadow:0 0 0 1px var(--accent-soft)}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px;line-height:1}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .sync{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--border2);transition:var(--transition)}
  .dot.on{background:var(--accent);box-shadow:0 0 0 0 var(--accent-soft);animation:pulse 2.4s infinite}
  .dot.off{background:var(--danger)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--accent-soft)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--panel2);
    display:grid;place-items:center;font-size:16px;transition:var(--transition)}
  .icon-btn:hover{background:var(--hover);border-color:var(--border2)}

  .main{display:flex;flex:1;min-height:0}

  /* ───── Kontaktliste (links) ───── */
  .sidebar{width:380px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg)}
  .search-wrap{padding:12px 14px;border-bottom:1px solid var(--border);position:relative}
  .search{width:100%;padding:10px 14px 10px 38px;background:var(--panel);border:1px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text);outline:none;transition:var(--transition)}
  .search:focus{border-color:var(--accent-soft);box-shadow:0 0 0 3px var(--accent-soft)}
  .search-wrap .si{position:absolute;left:25px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
  .contacts{flex:1;overflow-y:auto;padding:8px}
  .section-label{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:10px 10px 6px}
  .contact{display:flex;gap:12px;align-items:center;padding:11px 12px;border-radius:var(--radius-sm);
    cursor:pointer;transition:var(--transition);border:1px solid transparent}
  .contact:hover{background:var(--hover)}
  .contact.sel{background:var(--accent-soft);border-color:var(--accent-soft)}
  .avatar{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;
    font-weight:800;font-size:16px;color:#fff}
  .c-main{flex:1;min-width:0}
  .c-top{display:flex;align-items:baseline;gap:8px}
  .c-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .c-time{font-size:11px;color:var(--muted);flex-shrink:0}
  .c-prev{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;display:flex;align-items:center;gap:5px}
  .c-prev .tick{flex-shrink:0}
  .unread{margin-left:auto;min-width:20px;height:20px;padding:0 6px;border-radius:11px;background:var(--accent);
    color:var(--on-accent);font-size:11px;font-weight:800;display:grid;place-items:center;flex-shrink:0}
  .empty{padding:48px 24px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.6}
  .empty .big{font-size:40px;opacity:.5;margin-bottom:10px}

  /* ───── Chat (rechts) ───── */
  .chat{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--surface-base);position:relative}
  .chat-bg{position:absolute;inset:0;opacity:.5;pointer-events:none;
    background-image:radial-gradient(var(--hover) 1px, transparent 1px);background-size:22px 22px}
  .chat-empty{flex:1;display:grid;place-items:center;color:var(--muted);text-align:center;padding:30px;z-index:1}
  .chat-empty .big{font-size:52px;opacity:.4;margin-bottom:14px}
  .thread-head{display:flex;align-items:center;gap:13px;padding:12px 20px;border-bottom:1px solid var(--border);
    background:var(--panel);flex-shrink:0;z-index:2}
  .th-name{font-size:16px;font-weight:800;line-height:1.2}
  .th-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .back-btn{display:none;border:1px solid var(--border);background:var(--panel2);border-radius:9px;width:34px;height:34px;place-items:center;font-size:17px}
  .thread-body{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:3px;z-index:1}
  .day-sep{align-self:center;margin:14px 0 8px;font-size:11px;font-weight:700;color:var(--muted);
    background:var(--panel);border:1px solid var(--border);padding:4px 12px;border-radius:20px}
  .row{display:flex;width:100%}
  .row.out{justify-content:flex-end}
  .bubble{max-width:min(76%,560px);padding:9px 13px 7px;border-radius:14px;font-size:14.5px;line-height:1.5;
    white-space:pre-wrap;word-break:break-word;box-shadow:var(--shadow);position:relative}
  .row.in .bubble{background:var(--surface-raised);border:1px solid var(--border);border-top-left-radius:5px}
  .row.out .bubble{background:var(--accent-soft);border:1px solid var(--accent-soft);border-top-right-radius:5px}
  .bubble.hit{outline:2px solid var(--warning);outline-offset:1px}
  .meta{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:3px;font-size:10.5px;color:var(--muted)}
  .tick{font-size:12px;letter-spacing:-2px}
  .tick.read{color:var(--info)}
  .b-img{display:block;max-width:300px;max-height:340px;border-radius:10px;cursor:zoom-in;margin-bottom:4px}
  .b-audio{margin-bottom:3px}
  audio{height:40px;max-width:280px}
  .b-doc{display:flex;align-items:center;gap:11px;padding:10px 12px;background:var(--hover);border:1px solid var(--border);
    border-radius:10px;margin-bottom:4px;text-decoration:none;color:inherit;min-width:200px;transition:var(--transition)}
  .b-doc:hover{background:var(--accent-soft);border-color:var(--accent-soft)}
  .b-doc .di{width:38px;height:38px;border-radius:9px;background:rgba(229,118,90,.16);color:var(--danger);
    display:grid;place-items:center;font-size:18px;flex-shrink:0}
  .b-doc .dn{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .b-doc .dm{font-size:11px;color:var(--muted)}
  .pending .bubble{opacity:.7}
  .pending.err .bubble{border-color:var(--danger)}

  /* ───── Composer ───── */
  .composer{flex-shrink:0;border-top:1px solid var(--border);background:var(--panel);padding:12px 18px;z-index:2}
  .composer-row{display:flex;align-items:flex-end;gap:10px}
  .composer textarea{flex:1;min-height:44px;max-height:160px;resize:none;padding:11px 14px;background:var(--surface-base);
    border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;font:inherit;line-height:1.4;transition:var(--transition)}
  .composer textarea:focus{border-color:var(--accent-soft);box-shadow:0 0 0 3px var(--accent-soft)}
  .c-btn{width:44px;height:44px;border-radius:12px;border:1px solid var(--border);background:var(--panel2);
    display:grid;place-items:center;font-size:18px;flex-shrink:0;transition:var(--transition)}
  .c-btn:hover{background:var(--hover);border-color:var(--border2)}
  .c-btn.send{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
  .c-btn.send:hover{background:var(--accent-deep)}
  .c-btn.rec{background:var(--danger);border-color:var(--danger);color:#fff}
  .c-btn:disabled{opacity:.45;cursor:not-allowed}
  .attach-prev{display:flex;align-items:center;gap:12px;padding:10px 12px;margin-bottom:10px;background:var(--surface-base);
    border:1px solid var(--border);border-radius:var(--radius-sm)}
  .attach-prev img{width:46px;height:46px;border-radius:8px;object-fit:cover}
  .attach-prev .ap-i{width:46px;height:46px;border-radius:8px;display:grid;place-items:center;font-size:20px;background:var(--hover)}
  .attach-prev .ap-n{flex:1;min-width:0;font-size:13px}
  .attach-prev .ap-n small{display:block;color:var(--muted)}
  .recbar{display:flex;align-items:center;gap:12px;padding:11px 14px;margin-bottom:10px;background:rgba(229,118,90,.1);
    border:1px solid var(--danger);border-radius:var(--radius-sm)}
  .recbar .rdot{width:11px;height:11px;border-radius:50%;background:var(--danger);animation:pulse 1.2s infinite}
  .recbar .rt{font-variant-numeric:tabular-nums;font-weight:700}
  .hint{font-size:11px;color:var(--muted);margin-top:7px;text-align:center}

  /* ───── Toast (Schiefer) ───── */
  .toast-container{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px}
  .toast{padding:13px 18px;background:var(--panel2);border:1px solid var(--border);border-left:4px solid var(--accent);
    border-radius:12px;min-width:280px;max-width:380px;box-shadow:var(--shadow-lg);animation:slideIn .3s ease;transition:.3s}
  .toast.ok{border-left-color:var(--ok)} .toast.warn{border-left-color:var(--warn)} .toast.danger{border-left-color:var(--danger)}
  .toast .toast-title{font-weight:800;font-size:12.5px;margin-bottom:2px}
  .toast .toast-msg{font-size:12px;color:var(--muted)}
  @keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

  /* ───── Modal / Lightbox ───── */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);display:none;place-items:center;z-index:120}
  .modal-bg.show{display:grid}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);width:min(480px,92vw);
    box-shadow:var(--shadow-lg);overflow:hidden}
  .modal h3{padding:16px 20px;border-bottom:1px solid var(--border);font-size:15.5px;display:flex;align-items:center;gap:9px}
  .modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .field input{width:100%;padding:10px 13px;background:var(--surface-base);border:1px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text);outline:none;font:inherit}
  .field input:focus{border-color:var(--accent-soft);box-shadow:0 0 0 3px var(--accent-soft)}
  .field .note{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.5}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
  .btn{padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--panel2);font-weight:700;transition:var(--transition)}
  .btn:hover{background:var(--hover)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
  .btn.primary:hover{background:var(--accent-deep)}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.86);display:none;place-items:center;z-index:140;padding:30px;cursor:zoom-out}
  .lightbox.show{display:grid}
  .lightbox img{max-width:94vw;max-height:92vh;border-radius:10px;box-shadow:var(--shadow-lg)}

  /* ───── Responsive ───── */
  @media(max-width:820px){
    .sidebar{width:100%;position:absolute;inset:0;z-index:10}
    .sidebar.hide{display:none}
    .chat{position:absolute;inset:0;z-index:5}
    .back-btn{display:grid}
  }
</style>
</head>

const firebaseConfig = {
  apiKey:            "AIzaSyC6xVo-wmXC4JjG7qMQnOExIJU-UDvBluE",
  authDomain:        "jupidu-36804.firebaseapp.com",
  projectId:         "jupidu-36804",
  storageBucket:     "jupidu-36804.firebasestorage.app",
  messagingSenderId: "11390726952",
  appId:             "1:11390726952:web:aba2f101b6c5ca2bc5561d",
  measurementId:     "G-LT97CCT5DF"
};

const CONFIG = {
  // Öffentliche n8n-URL — Frontend ruft  {n8nPublicUrl}/webhook/wa-send  auf.
  // >>> 1-2-3-4 durch deine VPS-IP-mit-Bindestrichen ersetzen <<<  (auch via ⚙️ änderbar)
  n8nPublicUrl: "https://n8n.1-2-3-4.sslip.io",
  pollMs:        4000,     // Firestore-Polling-Intervall (Kontakte + offener Chat)
  allMsgsMs:     12000,    // Auffrischen des Volltext-Index (nur bei aktiver Suche)
  allMsgsLimit:  4000,     // max. Nachrichten im Suchindex
  chatsColl:    "wa_chats",
  msgsColl:     "wa_messages",

  n8nUrlStorage:"communicator_n8n_url",

<div id="root"></div>
<div class="toast-container" id="toasts"></div>
<input type="file" id="fileInput" accept="image/*,application/pdf,audio/*" style="display:none" />
<div class="lightbox" id="lightbox" data-action="close-lightbox"><img id="lightboxImg" alt="" /></div>

<script>
"use strict";
// ===========================================================================
//  Communicator  —  WhatsApp-Chat-Inbox  (Evolution API ⇄ n8n ⇄ Firestore)
//  IIFE-Scope · toast(type,title,msg) · data-action-Delegation · Schiefer/Leinen
// ===========================================================================
(function(){

const $   = (sel, r=document) => r.querySelector(sel);
const esc = (s) => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ---- Toast (Signatur wie ai-sync/Quantus) ---------------------------------
function toast(type, title, message, duration = 4000){
  const c = $("#toasts"); if (!c) return;
  const el = document.createElement("div");
  el.className = "toast " + (type || "");
  el.innerHTML = `<div class="toast-title">${esc(title)}</div><div class="toast-msg">${esc(message)}</div>`;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; el.style.transform = "translateX(40px)"; setTimeout(() => el.remove(), 300); }, duration);
}

// ---- App-State ------------------------------------------------------------
const state = {
  chats:    [],        // [{number, name, lastText, lastTs, unread, updatedAt}]
  messages: [],        // Nachrichten des offenen Chats (sortiert nach ts asc)
  allMsgs:  [],        // Volltext-Index über alle Chats (lazy, für Suche)
  selected: null,      // aktive Nummer (Doc-ID)
  search:   "",
  pending:  {},        // { number: [ {tempId, type, text, ts, status, localUrl, fileName} ] }
  lastSyncOk: false,
  lastSyncTs: 0
};

let db = null, fileKind = null;
let mediaRec = null, recChunks = [], recTimer = null, recStart = 0, recStream = null;
let attachment = null;   // { base64, mime, fileName, type, localUrl }

// ===========================================================================
//  Boot
// ===========================================================================
function boot(){
  // Theme aus localStorage
  try { if (localStorage.getItem(CONFIG.themeStorage) === "light") document.documentElement.classList.add("theme-light"); } catch(e){}
  // n8n-URL-Override aus localStorage
  try { const u = localStorage.getItem(CONFIG.n8nUrlStorage); if (u) CONFIG.n8nPublicUrl = u; } catch(e){}

  if (!firebaseConfig.projectId || !firebaseConfig.apiKey){ renderSetup(); return; }
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  } catch(e){ renderSetup(e.message); return; }

  renderShell();
  pollChats();          // Kontaktliste (Schleife)
  pollThread();         // offener Chat (Schleife)
  setInterval(tickSync, 1000);
  if (n8nConfigured() === false) toast("warn", "n8n-URL fehlt", "Trage im ⚙️ die öffentliche n8n-URL ein, sonst kannst du nicht senden.", 6000);
}

function n8nConfigured(){ return !(CONFIG.n8nPublicUrl || "").includes("1-2-3-4"); }

// ===========================================================================
//  Polling (Firestore lesen)
// ===========================================================================
async function pollChats(){
  try {
    const snap = await db.collection(CONFIG.chatsColl).orderBy("updatedAt","desc").get();
    state.chats = snap.docs.map(d => ({ number: d.id, ...d.data() }));
    state.lastSyncOk = true; state.lastSyncTs = Date.now();
    renderContacts();
  } catch(e){
    state.lastSyncOk = false;
    console.warn("pollChats:", e.message);
    if (/index/i.test(e.message)) toast("danger", "Firestore-Index nötig", e.message, 8000);
  } finally {
    updateSyncDot();
    setTimeout(pollChats, CONFIG.pollMs);
  }
}

async function fetchThread(){
  if (!state.selected) return;
  try {
    // where(number==) OHNE orderBy -> kein zusammengesetzter Index nötig; Sortierung clientseitig.
    const num = state.selected;
    const snap = await db.collection(CONFIG.msgsColl).where("number","==", num).get();
    if (num !== state.selected) return;   // Chat wurde zwischenzeitlich gewechselt
    state.messages = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=> (a.ts||0)-(b.ts||0));
    reconcilePending(num, state.messages);  // gesendete Platzhalter entfernen, sobald echt vorhanden
    renderThread();
  } catch(e){ console.warn("fetchThread:", e.message); }
}
function pollThread(){ fetchThread().finally(() => setTimeout(pollThread, CONFIG.pollMs)); }

async function refreshAllMsgs(){
  try {
    const snap = await db.collection(CONFIG.msgsColl).orderBy("ts","desc").limit(CONFIG.allMsgsLimit).get();
    state.allMsgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e){ console.warn("refreshAllMsgs:", e.message); }
}

// unread = 0 setzen (EINZIGER Schreibzugriff des Frontends -> erlaubt per Regeln)
async function resetUnread(number){
  try { await db.collection(CONFIG.chatsColl).doc(number).update({ unread: 0 }); }
  catch(e){ if (!/not-found|No document/i.test(e.message)) console.warn("resetUnread:", e.message); }
}

// ===========================================================================
//  Senden  (POST an n8n-Webhook)
// ===========================================================================
async function postToN8n(payload){
  if (!n8nConfigured()) throw new Error("n8n-URL nicht gesetzt (⚙️ Einstellungen).");
  const url = CONFIG.n8nPublicUrl.replace(/\/+$/,"") + "/webhook/wa-send";
  const res = await fetch(url, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) });
  let data = {}; try { data = await res.json(); } catch(e){}
  if (!res.ok || data.ok === false) throw new Error(data.error || ("HTTP " + res.status));
  return data;
}

async function sendText(){
  const ta = $("#composerInput");
  const text = (ta?.value || "").trim();
  if (attachment){ if (ta){ ta.value = ""; autoGrow(ta); } return sendAttachment(text); }   // Bild/PDF/Audio + optionale Caption
  if (!text || !state.selected) return;
  ta.value = ""; autoGrow(ta);
  const p = addPending(state.selected, { type:"text", text });
  try {
    await postToN8n({ to: state.selected, type:"text", text });
  } catch(e){
    markPendingError(p); ta.value = text; autoGrow(ta);
    toast("danger", "Senden fehlgeschlagen", e.message, 6000);
  }
}

async function sendAttachment(caption){
  if (!attachment || !state.selected) return;
  const a = attachment; attachment = null; renderComposer();
  const p = addPending(state.selected, { type:a.type, text:caption||"", localUrl:a.localUrl, fileName:a.fileName });
  try {
    await postToN8n({ to: state.selected, type: a.type, text: caption || undefined,
                      mediaBase64: a.base64, mime: a.mime, fileName: a.fileName });
  } catch(e){
    markPendingError(p);
    toast("danger", "Senden fehlgeschlagen", e.message, 6000);
  }
}

// ---- Pending-Platzhalter (optimistische Anzeige bis zum nächsten Poll) ----
function addPending(number, msg){
  const item = { tempId: "p"+state.lastSyncTs+Math.round(performance.now()), dir:"out", status:"pending", ts: Date.now(), ...msg };
  (state.pending[number] = state.pending[number] || []).push(item);
  renderThread();
  return item;
}
function markPendingError(item){ item.status = "error"; renderThread(); }
// Platzhalter entfernen, sobald die echte (von n8n geschriebene) Nachricht da ist –
// Fehler-Platzhalter bleiben sichtbar; sonst Fallback nach 20s.
function reconcilePending(number, realMsgs){
  const arr = state.pending[number]; if (!arr || !arr.length) return;
  state.pending[number] = arr.filter(p => {
    if (p.status === "error") return true;
    const matched = realMsgs.some(m => m.dir === "out" && m.type === p.type
        && (p.type !== "text" || (m.text||"") === (p.text||"")) && (m.ts||0) >= p.ts - 60000);
    if (matched) return false;
    return (Date.now() - p.ts) <= 20000;
  });
}

// ===========================================================================
//  Medien anhängen / aufnehmen
// ===========================================================================
function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(",")[1]);   // reines Base64 ohne data:-Prefix
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
function typeFromMime(mime){
  if (!mime) return "document";
  if (mime.startsWith("image/")) return "image";
  if (mime.startsWith("audio/")) return "audio";
  return "document";
}
async function onFilePicked(file){
  if (!file) return;
  if (file.size > 15*1024*1024){ toast("warn", "Datei zu groß", "Maximal 15 MB (WhatsApp-Limit).", 5000); return; }
  try {
    const base64 = await fileToBase64(file);
    attachment = { base64, mime: file.type || "application/octet-stream", fileName: file.name || "datei",
                   type: typeFromMime(file.type), localUrl: URL.createObjectURL(file) };
    renderComposer(); $("#composerInput")?.focus();
  } catch(e){ toast("danger", "Lesefehler", e.message); }
}

async function toggleRecording(){
  if (mediaRec && mediaRec.state === "recording"){ stopRecording(true); return; }
  if (!navigator.mediaDevices?.getUserMedia){ toast("warn", "Nicht möglich", "Mikrofon-Zugriff nicht verfügbar."); return; }
  try {
    recStream = await navigator.mediaDevices.getUserMedia({ audio:true });
    const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus" : "audio/webm";
    mediaRec = new MediaRecorder(recStream, { mimeType: mime });
    recChunks = [];
    mediaRec.ondataavailable = (e) => { if (e.data.size) recChunks.push(e.data); };
    mediaRec.onstop = onRecordingStop;
    mediaRec.start(); recStart = Date.now();
    recTimer = setInterval(updateRecTime, 250);
    renderComposer();
  } catch(e){ toast("warn", "Kein Mikrofon", e.message); }
}
function stopRecording(send){ mediaRec._send = send; clearInterval(recTimer); recTimer = null; try{ mediaRec.stop(); }catch(e){} }
async function onRecordingStop(){
  const send = mediaRec._send;
  recStream?.getTracks().forEach(t => t.stop());
  const blob = new Blob(recChunks, { type: mediaRec.mimeType });
  mediaRec = null; recStream = null;
  renderComposer();
  if (!send || !blob.size) return;
  try {
    const base64 = await fileToBase64(new File([blob], "sprachnachricht.webm", { type: blob.type }));
    attachment = { base64, mime: blob.type, fileName: "sprachnachricht.webm", type:"audio", localUrl: URL.createObjectURL(blob) };
    sendAttachment("");
  } catch(e){ toast("danger", "Fehler", e.message); }
}
function updateRecTime(){ const el = $("#recTime"); if (el) el.textContent = fmtDur(Date.now() - recStart); }

function tickSync(){

function searchMatches(c){
  const q = state.search.toLowerCase();
  if (!q) return true;

  if (String(c.number||"").toLowerCase().includes(q)) return true;
  if (String(c.lastText||"").toLowerCase().includes(q)) return true;
  // Volltext über alle Nachrichten dieses Kontakts
  return state.allMsgs.some(m => m.number === c.number && String(m.text||"").toLowerCase().includes(q));
}
function renderContacts(){

function renderChat(){

  chat.querySelectorAll(":scope > :not(.chat-bg)").forEach(n => n.remove());

  }
  const head = elFromHtml(`
    <div class="thread-head">
      <button class="back-btn" data-action="back" title="Zurück">‹</button>

  const body = document.createElement("div");

  chat.appendChild(head);
  chat.appendChild(body);
  chat.appendChild(buildComposer());

  renderComposer();

function renderThread(){
  const body = $("#threadBody"); if (!body) return;
  const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 80;
  const q = state.search.toLowerCase();
  const msgs = state.messages.slice();
  const pend = state.pending[state.selected] || [];
  body.innerHTML = "";
  if (!msgs.length && !pend.length){
    body.appendChild(elFromHtml(`<div class="empty" style="margin:auto"><div class="big">✍️</div>Noch keine Nachrichten.<br>Schreib unten die erste Nachricht.</div>`));
    return;
  }
  let lastDay = "";
  for (const m of msgs){
    const day = dayKey(m.ts);
    if (day !== lastDay){ body.appendChild(elFromHtml(`<div class="day-sep">${esc(dayLabel(m.ts))}</div>`)); lastDay = day; }
    body.appendChild(bubble(m, q));
  }
  for (const p of pend) body.appendChild(pendingBubble(p));
  if (atBottom) body.scrollTop = body.scrollHeight;
}

function bubble(m, q){
  const out = m.dir === "out";
  const hit = q && String(m.text||"").toLowerCase().includes(q);
  const row = document.createElement("div");
  row.className = "row " + (out ? "out" : "in");
  let media = "";
  if (m.type === "image" && m.mediaUrl)
    media = `<img class="b-img" src="${esc(m.mediaUrl)}" alt="Bild" data-action="enlarge" data-url="${esc(m.mediaUrl)}" loading="lazy" />`;
  else if (m.type === "audio" && m.mediaUrl)
    media = `<div class="b-audio"><audio controls preload="none" src="${esc(m.mediaUrl)}"></audio></div>`;
  else if (m.type === "document" && m.mediaUrl)
    media = `<a class="b-doc" href="${esc(m.mediaUrl)}" target="_blank" rel="noopener">
        <span class="di">📄</span><span><span class="dn">${esc(m.fileName||"Dokument")}</span><span class="dm">PDF öffnen</span></span></a>`;
  const text = m.text ? `<div>${highlight(m.text, q)}</div>` : "";
  const ticks = out ? `<span class="tick ${m.status==='read'?'read':''}">${statusTickGlyph(m.status)}</span>` : "";
  row.innerHTML = `<div class="bubble ${hit?'hit':''}">${media}${text}<div class="meta"><span>${fmtClock(m.ts)}</span>${ticks}</div></div>`;
  return row;
}
function pendingBubble(p){
  const row = document.createElement("div");
  row.className = "row out pending " + (p.status==="error"?"err":"");
  let media = "";
  if (p.type === "image" && p.localUrl) media = `<img class="b-img" src="${esc(p.localUrl)}" alt="" />`;
  else if (p.type === "audio") media = `<div class="b-audio">🎤 Sprachnachricht</div>`;
  else if (p.type === "document") media = `<div class="b-doc"><span class="di">📄</span><span class="dn">${esc(p.fileName||"Dokument")}</span></div>`;
  const text = p.text ? `<div>${esc(p.text)}</div>` : "";
  const st = p.status==="error" ? `<span style="color:var(--danger)">⚠ Fehler</span>` : `<span>🕓 sende…</span>`;
  row.innerHTML = `<div class="bubble">${media}${text}<div class="meta">${st}</div></div>`;
  return row;
}

function buildComposer(){
  const c = document.createElement("div");

  return c;
}
function renderComposer(){
  const c = $("#composer"); if (!c) return;
  const prevText = $("#composerInput")?.value || "";   // getippten Text über das Re-Render retten
  const recording = mediaRec && mediaRec.state === "recording";
  let top = "";
  if (recording){
    top = `<div class="recbar"><span class="rdot"></span><span class="rt" id="recTime">0:00</span>
      <span style="color:var(--muted);flex:1">Sprachnachricht wird aufgenommen…</span>
      <button class="c-btn" data-action="rec-cancel" title="Abbrechen">✕</button>
      <button class="c-btn send" data-action="rec-stop" title="Senden">➤</button></div>`;
  } else if (attachment){
    const prev = attachment.type === "image"
      ? `<img src="${esc(attachment.localUrl)}" alt="" />`
      : `<span class="ap-i">${attachment.type==="audio"?"🎤":"📄"}</span>`;
    top = `<div class="attach-prev">${prev}
      <span class="ap-n">${esc(attachment.fileName)}<small>${esc(attachment.type)} · wird mit gesendet</small></span>
      <button class="c-btn" data-action="attach-clear" title="Entfernen">✕</button></div>`;
  }
  c.innerHTML = `${top}
    <div class="composer-row">
      <button class="c-btn" data-action="attach" title="Bild / PDF anhängen" ${recording?"disabled":""}>📎</button>
      <textarea id="composerInput" rows="1" placeholder="Nachricht schreiben…" ${recording?"disabled":""}></textarea>
      <button class="c-btn rec" data-action="rec-toggle" title="Sprachnachricht">🎤</button>
      <button class="c-btn send" data-action="send" title="Senden (Enter)">➤</button>
    </div>
    <div class="hint">Enter sendet · Shift+Enter = neue Zeile · Bilder, PDF & Sprachnachrichten möglich</div>`;
  const ta = $("#composerInput");
  if (ta && !recording){
    ta.value = prevText; autoGrow(ta);
    ta.addEventListener("input", () => autoGrow(ta));
    ta.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendText(); } });
    ta.focus();
  }
  if (recording) updateRecTime();
}
function autoGrow(ta){ ta.style.height = "auto"; ta.style.height = Math.min(160, ta.scrollHeight) + "px"; }

// ===========================================================================
//  Helpers — Anzeige
// ===========================================================================
function displayName(c){ return (c && c.name) ? c.name : ("+" + (c?.number || "")); }
function previewText(c){
  if (c.lastText) return c.lastText;
  return "Medien-Nachricht";
}
function initials(c){
  const n = (c.name || "").trim();
  if (n){ const p = n.split(/\s+/); return ((p[0]?.[0]||"") + (p[1]?.[0]||"")).toUpperCase() || n[0].toUpperCase(); }
  const num = String(c.number||""); return num.slice(-2);
}
const AV_COLORS = ["#45c198","#6aa3de","#e5765a","#e3b048","#d885a6","#2ea27b"];
function avatarColor(key){ let h=0; const s=String(key||""); for (let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return AV_COLORS[h % AV_COLORS.length]; }

function statusTickGlyph(status){
  if (status === "read" || status === "delivered") return "✓✓";
  return "✓";   // sent (oder unbekannt)
}
function statusTick(status){ return `<span class="tick ${status==='read'?'read':''}">${statusTickGlyph(status)}</span> `; }

function highlight(text, q){
  const safe = esc(text);
  if (!q) return safe;
  try {
    const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + ")", "ig");
    return safe.replace(re, '<mark style="background:var(--warning);color:var(--on-accent);border-radius:3px;padding:0 1px">$1</mark>');
  } catch(e){ return safe; }
}

// ---- Zeit -----------------------------------------------------------------
function fmtClock(ts){ if (!ts) return ""; return new Date(ts).toLocaleTimeString(CONFIG.locale, {hour:"2-digit",minute:"2-digit"}); }
function fmtDur(ms){ const s=Math.floor(ms/1000); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function dayKey(ts){ const d=new Date(ts||0); return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); }
function dayLabel(ts){
  if (!ts) return "";
  const d = new Date(ts), now = new Date();
  const diff = Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate()) - new Date(d.getFullYear(),d.getMonth(),d.getDate()))/86400000);
  if (diff === 0) return "Heute";
  if (diff === 1) return "Gestern";
  return d.toLocaleDateString(CONFIG.locale, {weekday:"long", day:"2-digit", month:"long", year: d.getFullYear()!==now.getFullYear()?"numeric":undefined});
}

// ---- DOM-Helfer -----------------------------------------------------------
function elFromHtml(html){ const t=document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstElementChild; }

// ===========================================================================
//  Event-Delegation  (data-action)
// ===========================================================================
document.addEventListener("click", (e) => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.dataset.action;
  switch(action){
    case "select-chat": {
      const num = el.dataset.number;
      state.selected = num; state.messages = [];
      const c = state.chats.find(x => x.number === num);
      if (c && c.unread > 0){ c.unread = 0; resetUnread(num); }   // unread auf 0
      renderContacts(); renderChat();
      fetchThread();                       // sofort laden (Poll-Schleife läuft separat)
      $("#sidebar")?.classList.add("hide");
      break;
    }
    case "back": $("#sidebar")?.classList.remove("hide"); state.selected = null; renderChat(); renderContacts(); break;
    case "send": sendText(); break;
    case "attach": fileKind = null; $("#fileInput").click(); break;
    case "attach-clear": attachment = null; renderComposer(); break;
    case "rec-toggle": toggleRecording(); break;
    case "rec-stop": stopRecording(true); break;
    case "rec-cancel": stopRecording(false); break;
    case "toggle-theme": {
      const light = document.documentElement.classList.toggle("theme-light");
      try { localStorage.setItem(CONFIG.themeStorage, light ? "light" : "dark"); } catch(e){}
      break;
    }
    case "open-settings": openSettings(); break;
    case "close-modal": if (e.target === el) closeSettings(); break;  // nur Backdrop/Schließen-Button, nicht Inhalt
    case "save-settings": saveSettings(); break;
    case "enlarge": { $("#lightboxImg").src = el.dataset.url; $("#lightbox").classList.add("show"); break; }
    case "close-lightbox": $("#lightbox").classList.remove("show"); break;
  }
});

$("#fileInput").addEventListener("change", (e) => { onFilePicked(e.target.files[0]); e.target.value = ""; });

// ---- Start ----------------------------------------------------------------
document.addEventListener("DOMContentLoaded", boot);

})();
</script>
</body>
</html>
